<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Admin Master - Role Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#e0e5ec] text-[#2d3748] min-h-screen font-['Inter']">

    <div id="loginScreen" class="fixed inset-0 modal-overlay flex justify-center items-center z-50 p-4">
        <div class="neo-box p-10 w-full max-w-sm text-center">
            <h2 class="text-3xl font-black mb-6 text-[#2d3748]">Master<span class="text-[#DB5227]">Login</span></h2>
            <form onsubmit="fazerLogin(event)">
                <input type="password" id="senhaAdmin" class="neo-input text-center text-xl mb-6" placeholder="Senha Mestra" required>
                <button type="submit" class="neo-btn neo-btn-accent w-full py-4 text-lg">Acessar Sistema</button>
            </form>
        </div>
    </div>

    <div id="painelScreen" class="hidden max-w-7xl mx-auto flex-col md:flex-row gap-8 p-6 mt-6">
        
        <aside class="md:w-64 flex flex-col gap-4">
            <h1 class="text-2xl font-black text-[#2d3748] mb-6 px-2">Role<span class="text-[#DB5227]">Admin</span></h1>
            <button onclick="mudarAba('dash')" id="btn-dash" class="neo-btn py-4 w-full justify-start px-6" style="box-shadow: var(--neo-inset);">📊 Dashboard</button>
            <button onclick="mudarAba('aprovar')" id="btn-aprovar" class="neo-btn py-4 w-full justify-start px-6">⏳ Aprovações</button>
            <button onclick="mudarAba('gerenciar')" id="btn-gerenciar" class="neo-btn py-4 w-full justify-start px-6 text-[#DB5227]">🛠️ Gerenciar Eventos</button>
            <button onclick="mudarAba('categorias')" id="btn-categorias" class="neo-btn py-4 w-full justify-start px-6">🏷️ Categorias</button>
            <button onclick="mudarAba('parceiros')" id="btn-parceiros" class="neo-btn py-4 w-full justify-start px-6">🤝 Empresas (Parceiros)</button>
            <button onclick="mudarAba('perfil')" id="btn-perfil" class="neo-btn py-4 w-full justify-start px-6">👤 Meu Perfil</button>
            <button onclick="sairSistema()" class="neo-btn py-4 w-full justify-start px-6 text-red-500 mt-8">✕ Sair</button>
        </aside>

        <main class="flex-1 space-y-8">
            
            <section id="aba-dash">
                <h2 class="text-3xl font-black mb-8 text-[#2d3748]">Resumo da Plataforma</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    <div class="neo-box p-6 text-center"><p class="text-[10px] font-black uppercase text-gray-500 tracking-widest">Eventos Ativos</p><h3 id="stAtivos" class="text-4xl font-black mt-2 text-[#DB5227]">0</h3></div>
                    <div class="neo-box p-6 text-center"><p class="text-[10px] font-black uppercase text-gray-500 tracking-widest">Aprovar Pendentes</p><h3 id="stPendentes" class="text-4xl font-black mt-2 text-[#2d3748]">0</h3></div>
                    <div class="neo-box p-6 text-center"><p class="text-[10px] font-black uppercase text-gray-500 tracking-widest">Total de Curtidas</p><h3 id="stLikes" class="text-4xl font-black mt-2 text-blue-600">0</h3></div>
                    <div class="neo-box p-6 text-center"><p class="text-[10px] font-black uppercase text-gray-500 tracking-widest">Compartilhados</p><h3 id="stShares" class="text-4xl font-black mt-2 text-green-600">0</h3></div>
                </div>
            </section>

            <section id="aba-aprovar" class="hidden">
                <h2 class="text-3xl font-black mb-8">Revisar Sugestões</h2>
                <div id="listaPendentes" class="space-y-6"></div>
            </section>

            <section id="aba-gerenciar" class="hidden">
                <h2 class="text-3xl font-black mb-8">Gerenciar Eventos Publicados</h2>
                <div id="listaGerenciar" class="space-y-6"></div>
            </section>

            <section id="aba-categorias" class="hidden">
                <h2 class="text-3xl font-black mb-8">Categorias do Site</h2>
                <div class="neo-box p-6 mb-8 flex gap-4">
                    <input type="text" id="novaCat" class="neo-input flex-1" placeholder="Nova Categoria">
                    <button onclick="addCategoria()" class="neo-btn neo-btn-accent px-8">Salvar</button>
                </div>
                <div class="neo-box p-6"><ul id="listaCategorias" class="divide-y divide-gray-300/30"></ul></div>
            </section>

            <section id="aba-parceiros" class="hidden">
                <h2 class="text-3xl font-black mb-8">Empresas Cadastradas</h2>
                <div class="neo-box overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-200/50 text-[10px] font-black text-gray-500 uppercase tracking-widest border-b border-gray-300/30">
                            <tr><th class="p-6">Dados da Empresa</th><th class="p-6">Acesso</th><th class="p-6 text-center">Status</th></tr>
                        </thead>
                        <tbody id="listaParceiros" class="divide-y divide-gray-300/30 text-sm"></tbody>
                    </table>
                </div>
            </section>

            <section id="aba-perfil" class="hidden">
                <div class="neo-box p-10 max-w-2xl">
                    <h2 class="text-3xl font-black mb-8">Dados do Administrador</h2>
                    <form onsubmit="salvarPerfilAdmin(event)" class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-xs font-bold text-gray-500 mb-2 block">Nome</label><input type="text" id="admNome" class="neo-input"></div>
                            <div><label class="text-xs font-bold text-gray-500 mb-2 block">Sobrenome</label><input type="text" id="admSobrenome" class="neo-input"></div>
                        </div>
                        <div><label class="text-xs font-bold text-gray-500 mb-2 block">E-mail</label><input type="email" id="admEmail" class="neo-input"></div>
                        <hr class="border-gray-300 my-8">
                        <div><label class="text-xs font-bold text-gray-500 mb-2 block">Senha Atual</label><input type="password" id="admSenhaAntiga" class="neo-input" placeholder="Obrigatória para alterar"></div>
                        <div><label class="text-xs font-bold text-gray-500 mb-2 block">Nova Senha</label><input type="password" id="admSenhaNova" class="neo-input" placeholder="Deixe em branco se não for alterar"></div>
                        <button type="submit" class="neo-btn neo-btn-accent w-full py-4 mt-6 text-lg">Atualizar Segurança</button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API = "https://ondehoje-api.onrender.com";
        let adminDados = JSON.parse(localStorage.getItem('adminLogado')) || null;

        window.onload = () => { if (adminDados) abrirPainel(); };

        async function fazerLogin(e) {
            e.preventDefault();
            try {
                const res = await fetch(`${API}/admin/login`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({senha: document.getElementById('senhaAdmin').value})
                });
                if(res.ok) {
                    adminDados = await res.json();
                    localStorage.setItem('adminLogado', JSON.stringify(adminDados));
                    abrirPainel();
                } else { alert("Senha incorreta"); }
            } catch(err) { alert("Erro de conexão com o Python."); }
        }

        function abrirPainel() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('painelScreen').classList.remove('hidden');
            document.getElementById('painelScreen').classList.add('flex');
            document.getElementById('admNome').value = adminDados.nome;
            document.getElementById('admSobrenome').value = adminDados.sobrenome;
            document.getElementById('admEmail').value = adminDados.email;
            carregarDashboard();
        }

        function sairSistema() { localStorage.removeItem('adminLogado'); location.reload(); }

        function mudarAba(aba) {
            ['dash', 'aprovar', 'gerenciar', 'categorias', 'parceiros', 'perfil'].forEach(a => {
                document.getElementById('aba-'+a).classList.add('hidden');
                document.getElementById('btn-'+a).style.boxShadow = "var(--neo-shadow)";
            });
            document.getElementById('aba-'+aba).classList.remove('hidden');
            document.getElementById('btn-'+aba).style.boxShadow = "var(--neo-inset)";

            if(aba === 'dash') carregarDashboard();
            if(aba === 'aprovar') carregarPendentes();
            if(aba === 'gerenciar') carregarGerenciar();
            if(aba === 'categorias') carregarCategorias();
            if(aba === 'parceiros') carregarParceiros();
        }

        async function carregarDashboard() {
            const res = await fetch(`${API}/admin/stats`);
            const data = await res.json();
            document.getElementById('stAtivos').innerText = data.aprovados || 0;
            document.getElementById('stPendentes').innerText = data.pendentes || 0;
            document.getElementById('stLikes').innerText = data.total_likes || 0;
            document.getElementById('stShares').innerText = data.total_shares || 0;
        }

        async function carregarPendentes() {
            const res = await fetch(`${API}/roles/pendentes`);
            const dados = await res.json();
            const box = document.getElementById('listaPendentes');
            if(dados.length === 0) return box.innerHTML = "<p class='text-gray-500 font-bold px-4'>Não há sugestões novas no momento.</p>";
            box.innerHTML = dados.map(r => `
                <div class="neo-box p-6 flex flex-col md:flex-row gap-6 items-center">
                    <img src="${r.image}" class="w-full md:w-32 h-32 object-cover rounded-2xl shadow-md">
                    <div class="flex-1 w-full">
                        <span class="text-[10px] font-black text-[#DB5227] uppercase tracking-widest">${r.category || 'Evento'}</span>
                        <h4 class="text-xl font-black mt-1 text-[#2d3748]">${r.title}</h4>
                        <p class="text-xs text-gray-500 mt-1 font-bold">📍 ${r.venue} • ${r.cidade}/${r.estado}</p>
                    </div>
                    <div class="flex flex-col gap-3 w-full md:w-48">
                        <button type="button" onclick="acaoRole(${r.id}, 'aprovar')" class="neo-btn text-green-600 px-6 py-4 w-full">✅ Aprovar Rolê</button>
                        <button type="button" onclick="acaoRole(${r.id}, 'rejeitar')" class="neo-btn text-red-500 px-6 py-4 w-full">❌ Rejeitar</button>
                    </div>
                </div>`).join('');
        }
        async function acaoRole(id, acao) {
            await fetch(`${API}/roles/${acao}/${id}`, { method: 'POST' });
            carregarPendentes(); carregarDashboard();
        }

        // LÓGICA DE GERENCIAR OS JÁ APROVADOS
        async function carregarGerenciar() {
            const res = await fetch(`${API}/roles/gerenciar`);
            const dados = await res.json();
            const box = document.getElementById('listaGerenciar');
            if(dados.length === 0) return box.innerHTML = "<p class='text-gray-500 font-bold px-4'>Nenhum evento publicado.</p>";
            box.innerHTML = dados.map(r => {
                const isOculto = r.status === 'oculto';
                const statusTag = isOculto ? `<span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-[10px] font-black ml-2 uppercase">Oculto do Site</span>` : `<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-[10px] font-black ml-2 uppercase">No Ar</span>`;
                const btnOcultarExibir = isOculto 
                    ? `<button type="button" onclick="mudarStatusRole(${r.id}, 'aprovado')" class="neo-btn text-blue-600 px-6 py-3 w-full text-xs">👁️ Voltar pro Site</button>`
                    : `<button type="button" onclick="mudarStatusRole(${r.id}, 'oculto')" class="neo-btn text-yellow-600 px-6 py-3 w-full text-xs">🙈 Ocultar Evento</button>`;

                return `
                <div class="neo-box p-6 flex flex-col md:flex-row gap-6 items-center ${isOculto ? 'opacity-70' : ''}">
                    <img src="${r.image}" class="w-full md:w-24 h-24 object-cover rounded-xl shadow-sm">
                    <div class="flex-1 w-full">
                        <h4 class="text-lg font-black text-[#2d3748]">${r.title} ${statusTag}</h4>
                        <p class="text-xs text-gray-500 mt-1 font-bold">📍 ${r.venue} • ${r.cidade}/${r.estado}</p>
                    </div>
                    <div class="flex flex-col gap-2 w-full md:w-48">
                        ${btnOcultarExibir}
                        <button type="button" onclick="mudarStatusRole(${r.id}, 'excluir')" class="neo-btn text-red-500 px-6 py-3 w-full text-xs">🗑️ Excluir para sempre</button>
                    </div>
                </div>`;
            }).join('');
        }
        async function mudarStatusRole(id, status) {
            if(status === 'excluir' && !confirm("Tem certeza que quer apagar para sempre?")) return;
            await fetch(`${API}/roles/status/${id}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({status: status}) });
            carregarGerenciar(); carregarDashboard();
        }

        async function carregarCategorias() {
            const res = await fetch(`${API}/categorias`);
            const cats = await res.json();
            document.getElementById('listaCategorias').innerHTML = cats.map(c => `
                <li class="py-4 px-2 flex justify-between items-center"><span class="font-bold text-[#2d3748]">${c.nome}</span>
                <button onclick="delCategoria(${c.id})" class="text-red-500 font-black text-xs px-3 py-1 neo-box">Apagar</button></li>`).join('');
        }
        async function addCategoria() {
            const nome = document.getElementById('novaCat').value;
            if(!nome) return;
            await fetch(`${API}/categorias/add`, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({nome: nome})});
            document.getElementById('novaCat').value = ""; carregarCategorias();
        }
        async function delCategoria(id) { await fetch(`${API}/categorias/delete/${id}`, { method: 'POST' }); carregarCategorias(); }

        async function carregarParceiros() {
            const res = await fetch(`${API}/parceiros/lista`);
            const p = await res.json();
            const box = document.getElementById('listaParceiros');
            if(p.length === 0) return box.innerHTML = "<tr><td colspan='3' class='p-6 text-center text-gray-500 font-bold'>Nenhuma empresa.</td></tr>";
            box.innerHTML = p.map(x => `
                <tr>
                    <td class="p-6"><div class="font-black text-[#2d3748] text-lg">${x.nome}</div><div class="text-[11px] font-bold text-gray-500 mt-1 tracking-widest">CNPJ: ${x.cnpj} • ${x.cidade}/${x.estado}</div></td>
                    <td class="p-6"><div class="text-[#2d3748] font-bold">${x.email}</div><div class="text-xs text-red-500 font-black mt-2 bg-red-50 inline-block px-3 py-1 rounded-md">Senha: ${x.senha}</div></td>
                    <td class="p-6 text-center"><span class="bg-green-100 text-green-700 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest" style="box-shadow: var(--neo-inset);">Ativo</span></td>
                </tr>`).join('');
        }

        async function salvarPerfilAdmin(e) {
            e.preventDefault();
            const payload = {
                nome: document.getElementById('admNome').value, sobrenome: document.getElementById('admSobrenome').value,
                email: document.getElementById('admEmail').value, senha_antiga: document.getElementById('admSenhaAntiga').value,
                senha_nova: document.getElementById('admSenhaNova').value
            };
            const res = await fetch(`${API}/admin/perfil`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            if(res.ok) { alert("Atualizado!"); document.getElementById('admSenhaAntiga').value = ""; document.getElementById('admSenhaNova').value = ""; } 
            else { alert("Sua senha atual está incorreta."); }
        }
    </script>
</body>
</html>
