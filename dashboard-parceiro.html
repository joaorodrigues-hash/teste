<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Parceiro - Onde Hoje</title>
    <link rel="icon" type="image/png" href="icon2.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#e0e5ec] text-[#2d3748] min-h-screen font-['Inter']">

    <div id="loginOverlay" class="fixed inset-0 modal-overlay flex justify-center items-center z-50 p-4">
        <div class="neo-box p-10 w-full max-w-sm text-center">
            
            <div class="flex justify-center items-center gap-2 mb-4">
                <img src="icon.png" class="h-8 w-auto">
                <h2 class="text-3xl font-black text-[#2d3748]">Acesso <span class="text-[#DB5227]">Parceiro</span></h2>
            </div>
            
            <p class="text-xs text-gray-500 mb-8 font-bold">Gerencie seus eventos e métricas.</p>
            <form onsubmit="fazerLogin(event)" class="space-y-4">
                <input type="email" id="loginEmail" class="neo-input" placeholder="Seu E-mail" required>
                <input type="password" id="loginSenha" class="neo-input" placeholder="Sua Senha" required>
                <button type="submit" class="neo-btn neo-btn-accent w-full py-4 text-lg mt-4">Entrar no Painel</button>
            </form>
            <div class="mt-6 flex flex-col gap-2">
                <a href="parceiros.html" class="text-xs font-bold text-[#DB5227] hover:underline">Ainda não cadastrou a empresa?</a>
            </div>
        </div>
    </div>

    <div id="painelParceiro" class="hidden max-w-6xl mx-auto flex-col md:flex-row gap-8 p-6 mt-6">
        <aside class="md:w-64 flex flex-col gap-4">
            <div class="flex items-center gap-2 px-2 mb-6">
                <img src="icon.png" class="h-6 w-auto">
                <h1 class="text-2xl font-black text-[#2d3748]">Onde<span class="text-[#DB5227]">Hoje</span></h1>
            </div>
            
            <button onclick="mudarAba('dash')" id="btn-dash" class="neo-btn py-4 w-full justify-start px-6" style="box-shadow: var(--neo-inset);">📊 Resumo</button>
            <button onclick="abrirSugerir()" class="neo-btn py-4 w-full justify-start px-6 text-[#DB5227]">➕ Novo Evento</button>
            <button onclick="mudarAba('perfil')" id="btn-perfil" class="neo-btn py-4 w-full justify-start px-6">👤 Meu Perfil</button>
            <button onclick="sairSistema()" class="neo-btn py-4 w-full justify-start px-6 text-red-500 mt-8">✕ Sair</button>
        </aside>

        <main class="flex-1 space-y-8">
            <section id="aba-dash">
                <div class="neo-box p-8 mb-8">
                    <h2 class="text-3xl font-black text-[#2d3748]">Bem-vindo(a), <span id="userNome" class="text-[#DB5227]">Parceiro</span>!</h2>
                    <p class="text-gray-500 font-bold mt-1" id="userEmpresa">Acompanhe seus resultados.</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="neo-box p-8 text-center">
                        <p class="text-[10px] font-black uppercase text-gray-500 mb-1 tracking-widest">📅 Eventos Publicados</p>
                        <h3 id="statSugeridos" class="text-5xl font-black mt-2 text-[#2d3748]">0</h3>
                    </div>
                    <div class="neo-box p-8 text-center">
                        <p class="text-[10px] font-black uppercase text-gray-500 mb-1 tracking-widest">❤️ Pessoas Interessadas</p>
                        <h3 id="statLikes" class="text-5xl font-black mt-2 text-[#DB5227]">0</h3>
                    </div>
                    <div class="neo-box p-8 text-center">
                        <p class="text-[10px] font-black uppercase text-gray-500 mb-1 tracking-widest">🔗 Shares (Wpp/Redes)</p>
                        <h3 id="statShares" class="text-5xl font-black mt-2 text-blue-600">0</h3>
                    </div>
                </div>
            </section>

            <section id="aba-perfil" class="hidden">
                <div class="neo-box p-10 max-w-2xl">
                    <h2 class="text-3xl font-black mb-8 text-[#2d3748]">Meus Dados</h2>
                    <form onsubmit="salvarPerfilParceiro(event)" class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-xs font-bold text-gray-500 mb-2 block">Nome</label><input type="text" id="pNome" class="neo-input"></div>
                            <div><label class="text-xs font-bold text-gray-500 mb-2 block">Sobrenome</label><input type="text" id="pSobrenome" class="neo-input"></div>
                        </div>
                        <div><label class="text-xs font-bold text-gray-500 mb-2 block">E-mail</label><input type="email" id="pEmail" class="neo-input" readonly></div>
                        <hr class="border-gray-300 my-8">
                        <h3 class="font-black text-[#2d3748]">Trocar Senha</h3>
                        <div><label class="text-xs font-bold text-gray-500 mb-2 block">Senha Atual</label><input type="password" id="pSenhaAntiga" class="neo-input" placeholder="Obrigatório para salvar" required></div>
                        <div><label class="text-xs font-bold text-gray-500 mb-2 block">Nova Senha</label><input type="password" id="pSenhaNova" class="neo-input" placeholder="Deixe vazio se não for trocar"></div>
                        <button type="submit" class="neo-btn neo-btn-accent w-full py-4 mt-6 text-lg">Atualizar Perfil</button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <div id="modalSugerirP" class="hidden fixed inset-0 modal-overlay z-50 flex justify-center items-center p-4">
        <div class="neo-box w-full max-w-md p-8 relative max-h-[90vh] overflow-y-auto">
            
            <button type="button" onclick="fecharSugerir()" class="absolute top-5 right-5 text-gray-400 font-black hover:text-red-500">X</button>
            
            <h2 class="text-2xl font-black mb-6 text-[#2d3748]">Divulgar Evento</h2>
            <form id="formSugerirP" onsubmit="enviarRoleParceiro(event)" class="space-y-4">
                <input type="text" id="pModTitle" placeholder="Nome do Evento" required class="neo-input">
                <input type="text" id="pModVenue" placeholder="Local / Bar" required class="neo-input">
                
                <div class="flex gap-2">
                    <select id="pModEstado" required class="neo-input w-1/3 text-xs"></select>
                    <select id="pModCidade" required disabled class="neo-input w-2/3 text-xs"></select>
                </div>
                <select id="pModCategory" required class="neo-input w-full text-xs"></select>

                <input type="text" id="pModLink" placeholder="Link do Ingresso (Sympla, etc)" class="neo-input">
                <input type="url" id="pModImg" placeholder="Link da Imagem (Obrigatório)" required class="neo-input">
                <textarea id="pModDesc" placeholder="Descrição rápida..." class="neo-input h-20"></textarea>

                <button type="submit" class="neo-btn neo-btn-accent w-full py-4 text-lg mt-2">Mandar para Aprovação</button>
            </form>
        </div>
    </div>

    <script>
        const API = "https://ondehoje-api.onrender.com";
        let parceiroData = JSON.parse(localStorage.getItem('parceiroLogado')) || null;

        window.onload = async () => { 
            if (parceiroData) abrirPainel(); 
            await carregarEstados();
            await carregarCategorias();
        };

        async function fazerLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const senha = document.getElementById('loginSenha').value;
            try {
                const res = await fetch(`${API}/parceiros/login`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email, senha})
                });
                if(res.ok) {
                    parceiroData = await res.json();
                    localStorage.setItem('parceiroLogado', JSON.stringify(parceiroData));
                    abrirPainel();
                } else { alert("Acesso Negado: E-mail ou Senha incorretos."); }
            } catch(e) { alert("Erro de comunicação com o servidor."); }
        }

        function abrirPainel() {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('painelParceiro').classList.remove('hidden');
            document.getElementById('painelParceiro').classList.add('flex');
            
            document.getElementById('userNome').innerText = parceiroData.nome || parceiroData.empresa;
            document.getElementById('userEmpresa').innerText = parceiroData.empresa;
            document.getElementById('pNome').value = parceiroData.nome;
            document.getElementById('pSobrenome').value = parceiroData.sobrenome;
            document.getElementById('pEmail').value = parceiroData.email;
            
            carregarStats();
        }

        function sairSistema() { localStorage.removeItem('parceiroLogado'); location.reload(); }

        function mudarAba(aba) {
            ['dash', 'perfil'].forEach(a => {
                document.getElementById('aba-'+a).classList.add('hidden');
                document.getElementById('btn-'+a).style.boxShadow = "var(--neo-shadow)";
            });
            document.getElementById('aba-'+aba).classList.remove('hidden');
            document.getElementById('btn-'+aba).style.boxShadow = "var(--neo-inset)";
        }

        async function carregarStats() {
            const res = await fetch(`${API}/parceiros/stats/${parceiroData.id}`);
            const data = await res.json();
            document.getElementById('statSugeridos').innerText = data.sugeridos;
            document.getElementById('statLikes').innerText = data.likes;
            document.getElementById('statShares').innerText = data.shares;
        }

        function abrirSugerir() {
            document.getElementById('modalSugerirP').classList.remove('hidden');
        }

        // FUNÇÃO NOVA PARA LIMPAR O FORMULÁRIO AO FECHAR
        function fecharSugerir() {
            document.getElementById('modalSugerirP').classList.add('hidden');
            document.getElementById('formSugerirP').reset(); // Zera todos os inputs
        }

        async function enviarRoleParceiro(e) {
            e.preventDefault();
            const payload = {
                title: document.getElementById('pModTitle').value, 
                venue: document.getElementById('pModVenue').value,
                estado: document.getElementById('pModEstado').value, 
                cidade: document.getElementById('pModCidade').value, 
                price: "A combinar", 
                category: document.getElementById('pModCategory').value, 
                image: document.getElementById('pModImg').value,
                descricao: document.getElementById('pModDesc').value,
                link_ingresso: document.getElementById('pModLink').value, 
                parceiro_id: parceiroData.id
            };
            const res = await fetch(`${API}/roles/sugerir`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            if(res.ok) {
                alert("Enviado com sucesso! Agora é só aguardar o Admin aprovar.");
                fecharSugerir(); // Fecha E zera os campos automaticamente
                carregarStats();
            }
        }

        async function carregarCategorias() {
            try {
                const res = await fetch(`${API}/categorias`);
                const cats = await res.json();
                const sel = document.getElementById('pModCategory');
                sel.innerHTML = '<option value="">Categoria</option>';
                cats.forEach(c => sel.innerHTML += `<option value="${c.nome}">${c.nome}</option>`);
            } catch(e) {}
        }

        async function carregarEstados() {
            try {
                const res = await fetch('https://servicodados.ibge.gov.br/api/v1/localidades/estados?orderBy=nome');
                const estados = await res.json();
                const sel = document.getElementById('pModEstado');
                sel.innerHTML = '<option value="">UF</option>';
                estados.forEach(uf => sel.innerHTML += `<option value="${uf.sigla}">${uf.sigla}</option>`);
            } catch(e) {}
        }

        document.getElementById('pModEstado').addEventListener('change', async (e) => {
            const modCid = document.getElementById('pModCidade');
            modCid.innerHTML = '<option value="">Buscando...</option>';
            try {
                const res = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${e.target.value}/municipios`);
                const cidades = await res.json();
                modCid.innerHTML = '<option value="">Selecione a Cidade</option>';
                cidades.forEach(c => modCid.innerHTML += `<option value="${c.nome}">${c.nome}</option>`);
                modCid.disabled = false;
            } catch(err) {}
        });

        async function salvarPerfilParceiro(e) {
            e.preventDefault();
            const payload = {
                nome: document.getElementById('pNome').value, sobrenome: document.getElementById('pSobrenome').value,
                email: document.getElementById('pEmail').value, senha_antiga: document.getElementById('pSenhaAntiga').value,
                senha_nova: document.getElementById('pSenhaNova').value
            };
            const res = await fetch(`${API}/parceiros/perfil/${parceiroData.id}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            if(res.ok) { alert("Atualizado!"); document.getElementById('pSenhaAntiga').value = ""; } 
            else { alert("Senha atual incorreta."); }
        }
    </script>
</body>
</html>
